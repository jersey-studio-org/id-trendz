<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 510" width="400" height="510">
  <!--
    Jersey Front Template — redesigned with correct proportions
    Body width: 212 px (x=94 to x=306), 53% of 400 px canvas
    Color zone: fill="#FFFFFF" — replaced by JerseyTemplateCanvas at render time
    V-neck collar is part of the body outline
  -->
  <defs>
    <filter id="shirt-shadow" x="-8%" y="-4%" width="120%" height="112%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#00000018"/>
    </filter>
  </defs>

  <!--
    Full jersey outline — single closed path, clockwise:
      Left collar → left shoulder → left sleeve (out & back) →
      body left side down → hem → body right side up →
      right sleeve (back & out) → right shoulder → right collar →
      V-neck down to centre → back to left collar
  -->
  <path
    id="jersey-body"
    filter="url(#shirt-shadow)"
    d="
      M 163 44
      L 94 76
      C 70 74, 40 70, 16 70
      L 12 210
      C 12 224, 20 235, 34 234
      L 65 230
      C 78 229, 92 218, 94 206
      L 94 486
      L 306 486
      L 306 206
      C 308 218, 322 229, 335 230
      L 366 234
      C 380 235, 388 224, 388 210
      L 384 70
      C 360 70, 330 74, 306 76
      L 237 44
      L 200 104
      L 163 44
      Z
    "
    fill="#FFFFFF"
    stroke="#C8C8C8"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Left shoulder seam -->
  <line x1="163" y1="44" x2="94" y2="76"
    stroke="rgba(0,0,0,0.12)" stroke-width="1.2" stroke-dasharray="5,3"/>
  <!-- Right shoulder seam -->
  <line x1="237" y1="44" x2="306" y2="76"
    stroke="rgba(0,0,0,0.12)" stroke-width="1.2" stroke-dasharray="5,3"/>
  <!-- Left side seam -->
  <line x1="94" y1="206" x2="94" y2="486"
    stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
  <!-- Right side seam -->
  <line x1="306" y1="206" x2="306" y2="486"
    stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
</svg>

  <!-- Jersey body fill (colorable region) -->
  <g id="jersey-body" filter="url(#jersey-shadow)">
    <!-- Main torso -->
    <path
      d="
        M 145 28
        C 160 20, 180 15, 200 15
        C 220 15, 240 20, 255 28
        L 270 50
        C 270 50, 258 58, 250 65
        C 242 72, 238 80, 238 92
        L 238 462
        L 162 462
        L 162 92
        C 162 80, 158 72, 150 65
        C 142 58, 130 50, 130 50
        Z
      "
      fill="#FFFFFF"
      stroke="#CCCCCC"
      stroke-width="1.5"
    />
    <!-- Left sleeve -->
    <path
      d="
        M 130 50
        C 118 56, 100 66, 82 80
        L 52 110
        L 38 160
        L 38 230
        C 38 240, 44 248, 52 250
        L 88 258
        C 96 260, 104 254, 106 246
        L 115 185
        C 118 165, 124 148, 130 138
        L 148 100
        L 130 50
        Z
      "
      fill="#FFFFFF"
      stroke="#CCCCCC"
      stroke-width="1.5"
    />
    <!-- Right sleeve -->
    <path
      d="
        M 270 50
        C 282 56, 300 66, 318 80
        L 348 110
        L 362 160
        L 362 230
        C 362 240, 356 248, 348 250
        L 312 258
        C 304 260, 296 254, 294 246
        L 285 185
        C 282 165, 276 148, 270 138
        L 252 100
        L 270 50
        Z
      "
      fill="#FFFFFF"
      stroke="#CCCCCC"
      stroke-width="1.5"
    />
    <!-- Collar (V-neck) -->
    <path
      d="
        M 168 28
        L 200 70
        L 232 28
      "
      fill="none"
      stroke="#BBBBBB"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Shoulder seam lines -->
    <line x1="145" y1="28" x2="162" y2="92" stroke="#DDDDDD" stroke-width="1"/>
    <line x1="255" y1="28" x2="238" y2="92" stroke="#DDDDDD" stroke-width="1"/>
    <!-- Side seams -->
    <line x1="162" y1="92" x2="162" y2="462" stroke="#DDDDDD" stroke-width="1"/>
    <line x1="238" y1="92" x2="238" y2="462" stroke="#DDDDDD" stroke-width="1"/>
  </g>

  <!-- Number print zone indicator (transparent – only used for canvas math) -->
  <!-- Front center zone: cx=200 cy=195, width≈140, height≈100 -->
  <!-- Left chest zone: cx=145 cy=160, width≈70, height≈40 -->
</svg>
