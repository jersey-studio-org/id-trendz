<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <!--
    Jersey Front Template
    The jersey body is the WHITE fill area.
    Color tinting is applied programmatically over this shape.
    "jersey-body" group = main colorable area
    Print zones (invisible guides):
      front-center:  cx=200 cy=200
      left-chest:    cx=145 cy=170
  -->
  <defs>
    <filter id="jersey-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Jersey body fill (colorable region) -->
  <g id="jersey-body" filter="url(#jersey-shadow)">
    <!-- Main torso -->
    <path
      d="
        M 145 28
        C 160 20, 180 15, 200 15
        C 220 15, 240 20, 255 28
        L 270 50
        C 270 50, 258 58, 250 65
        C 242 72, 238 80, 238 92
        L 238 462
        L 162 462
        L 162 92
        C 162 80, 158 72, 150 65
        C 142 58, 130 50, 130 50
        Z
      "
      fill="#FFFFFF"
      stroke="#CCCCCC"
      stroke-width="1.5"
    />
    <!-- Left sleeve -->
    <path
      d="
        M 130 50
        C 118 56, 100 66, 82 80
        L 52 110
        L 38 160
        L 38 230
        C 38 240, 44 248, 52 250
        L 88 258
        C 96 260, 104 254, 106 246
        L 115 185
        C 118 165, 124 148, 130 138
        L 148 100
        L 130 50
        Z
      "
      fill="#FFFFFF"
      stroke="#CCCCCC"
      stroke-width="1.5"
    />
    <!-- Right sleeve -->
    <path
      d="
        M 270 50
        C 282 56, 300 66, 318 80
        L 348 110
        L 362 160
        L 362 230
        C 362 240, 356 248, 348 250
        L 312 258
        C 304 260, 296 254, 294 246
        L 285 185
        C 282 165, 276 148, 270 138
        L 252 100
        L 270 50
        Z
      "
      fill="#FFFFFF"
      stroke="#CCCCCC"
      stroke-width="1.5"
    />
    <!-- Collar (round neck) -->
    <path
      d="
        M 168 28
        C 176 40, 191 45, 200 46
        C 209 45, 224 40, 232 28
      "
      fill="none"
      stroke="#BBBBBB"
      stroke-width="2"
      stroke-linecap="round"
    />
    <!-- Shoulder seam lines -->
    <line x1="145" y1="28" x2="162" y2="92" stroke="#DDDDDD" stroke-width="1"/>
    <line x1="255" y1="28" x2="238" y2="92" stroke="#DDDDDD" stroke-width="1"/>
    <!-- Side seams -->
    <line x1="162" y1="92" x2="162" y2="462" stroke="#DDDDDD" stroke-width="1"/>
    <line x1="238" y1="92" x2="238" y2="462" stroke="#DDDDDD" stroke-width="1"/>
  </g>

  <!-- Number print zone indicator (transparent – only used for canvas math) -->
  <!-- Front center zone: cx=200 cy=195, width≈140, height≈100 -->
  <!-- Left chest zone: cx=145 cy=160, width≈70, height≈40 -->
</svg>
